name: Logic-Service CI

on:
  pull_request:
    paths:
      - "Logic-Service/**"
      - ".github/workflows/logic-service-ci.yml"
  push:
    branches: [ main ]
    paths:
      - "Logic-Service/**"
      - ".github/workflows/logic-service-ci.yml"

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Logic-Service

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: Logic-Service/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          python -m flake8 . --max-line-length=120 --count --show-source --statistics

      - name: Run tests
        run: |
          python -m pytest tests/ -v
