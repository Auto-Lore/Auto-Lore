name: Memory-Service CI

on:
  pull_request:
    paths:
      - "Memory-Service/**"
      - ".github/workflows/memory-service-ci.yml"
  push:
    branches: [ main ]
    paths:
      - "Memory-Service/**"
      - ".github/workflows/memory-service-ci.yml"

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: Memory-Service/requirements.txt

      - name: Install dependencies
        working-directory: Memory-Service
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with flake8
        working-directory: Memory-Service
        run: |
          python -m flake8 . --max-line-length=120 --count --show-source --statistics

      - name: Run tests
        working-directory: Memory-Service
        run: |
          python -m pytest tests/ -v --cov=. --cov-report=term-missing --cov-fail-under=80
