name: Memory-Service Docker Build

on:
  push:
    branches: [main]
    paths:
      - "Memory-Service/**"
      - ".github/workflows/memory-service-docker.yml"
  pull_request:
    paths:
      - "Memory-Service/**"
      - ".github/workflows/memory-service-docker.yml"

jobs:
  docker-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build only — no push. Validates the Dockerfile and image build in CI.
      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./Memory-Service
          push: false
          tags: auto-lore-memory-service:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
