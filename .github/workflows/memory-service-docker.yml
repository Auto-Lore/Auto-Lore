name: Memory-Service Docker Build and Publish

on:
  push:
    branches: [main]
    paths:
      - "Memory-Service/**"
      - ".github/workflows/memory-service-docker.yml"
  pull_request:
    paths:
      - "Memory-Service/**"
      - ".github/workflows/memory-service-docker.yml"

# AI-generated: permissions block required for GHCR push via GITHUB_TOKEN
permissions:
  contents: read
  packages: write

jobs:
  docker-build:
    name: Build and Publish Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # AI-generated: login runs only on push to main, not on pull requests
      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # AI-generated: metadata-action derives tags and OCI labels from git context
      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/auto-lore-memory-service
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./Memory-Service
          # Push only on push to main; pull requests build only for validation
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
